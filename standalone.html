<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambient · Mark Walhimer</title>
    <!--
      Tone.js is loaded from ./lib/tone.js (bundled in this repo) — no CDN required.
    -->
    <style>
      :root {
        --bg: #0f1117;
        --surface: #181b24;
        --border: #2a2f3d;
        --text: #e6e4df;
        --muted: #8b8f9a;
        --accent: #c4a35a;
        --accent-dim: #8a7340;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        font-size: clamp(15px, 1.35vw, 20px);
        height: 100%;
      }

      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.4;
      }

      #app {
        height: 100%;
        max-width: none;
        margin: 0;
        padding: 0.65rem 0.75rem 0.7rem;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .shell {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        min-height: 0;
      }

      .top-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 1rem;
        padding: 0.25rem 0 0.5rem;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .title-block {
        display: flex;
        flex-direction: column;
        gap: 0.1rem;
        margin-right: 0.35rem;
      }

      .top-bar h1 {
        font-size: 1.45rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        margin: 0;
        color: var(--accent);
        line-height: 1.15;
      }

      .byline {
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-transform: none;
      }

      .top-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      label.compact {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.95rem;
        color: var(--muted);
      }

      label.compact select {
        min-width: 0;
      }

      .stepper {
        display: inline-flex;
        align-items: stretch;
        border: 1px solid var(--border);
        border-radius: 4px;
        overflow: hidden;
        background: var(--bg);
      }

      .stepper input[type="number"] {
        width: 3.5rem;
        min-width: 3rem;
        text-align: center;
        border: none;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        border-radius: 0;
        min-height: 2.1rem;
        font-size: 0.95rem;
      }

      .stepper button {
        font: inherit;
        font-size: 0.75rem;
        line-height: 1;
        padding: 0.15rem 0.4rem;
        border: none;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        min-width: 1.75rem;
      }

      .stepper button:hover {
        background: var(--border);
      }

      .stepper button:active {
        background: var(--accent-dim);
        color: var(--bg);
      }

      #tuning-val {
        font-variant-numeric: tabular-nums;
        min-width: 2.25rem;
      }

      label.compact select {
        font-size: 1rem;
        padding: 0.35rem 0.5rem;
        min-height: 2.25rem;
      }

      .voices-strip {
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        gap: 0.4rem 0.5rem;
        align-items: end;
        flex-shrink: 0;
        padding: 0.25rem 0;
      }

      .voices-strip label {
        font-size: 0.8rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        min-width: 0;
      }

      .voices-strip select {
        width: 100%;
        min-width: 0;
        font-size: 0.88rem;
        padding: 0.35rem 0.35rem;
        min-height: 2.1rem;
      }

      .columns {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.5rem;
        min-height: 0;
      }

      @media (max-width: 1400px) {
        .columns {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: auto auto;
          overflow-y: auto;
        }
      }

      @media (max-width: 900px) {
        .columns {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 560px) {
        .columns {
          grid-template-columns: 1fr;
        }

        body {
          overflow: auto;
        }
      }

      @media (max-height: 520px) {
        body {
          overflow-y: auto;
        }
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.65rem 0.75rem;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .panel h2 {
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--muted);
        margin: 0 0 0.5rem;
        font-weight: 600;
        flex-shrink: 0;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 0.75rem;
        align-items: center;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        font-size: 0.9rem;
        color: var(--muted);
      }

      label.inline {
        flex-direction: row;
        align-items: center;
        gap: 0.45rem;
      }

      select,
      input[type="number"] {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 0.4rem 0.45rem;
        border-radius: 4px;
        font: inherit;
        font-size: 0.95rem;
        min-width: 3rem;
        min-height: 2.25rem;
      }

      select:focus,
      input:focus,
      button:focus-visible {
        outline: 2px solid var(--accent-dim);
        outline-offset: 2px;
      }

      input[type="range"] {
        width: 8rem;
        min-width: 5rem;
        height: 0.45rem;
        accent-color: var(--accent);
      }

      button#play {
        font: inherit;
        font-size: 1.05rem;
        padding: 0.45rem 1.15rem;
        border-radius: 5px;
        border: 2px solid var(--accent);
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        letter-spacing: 0.03em;
        min-height: 2.5rem;
      }

      button#play:hover {
        background: rgba(196, 163, 90, 0.12);
      }

      button#play.playing {
        background: var(--accent);
        color: var(--bg);
      }

      button#reset {
        font: inherit;
        font-size: 0.95rem;
        padding: 0.4rem 0.65rem;
        border-radius: 5px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        min-height: 2.5rem;
      }

      button#reset:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .radio-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.4rem 0.65rem;
        align-content: start;
        overflow: auto;
        flex: 1;
        min-height: 0;
      }

      .radio-grid label.inline {
        font-size: 0.9rem;
      }

      .radio-grid input[type="number"] {
        width: 3.25rem;
        min-height: 2rem;
      }

      .radio-grid input[type="radio"] {
        width: 1.05rem;
        height: 1.05rem;
      }

      .effects-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.45rem 0.65rem;
        flex: 1;
        align-content: start;
      }

      .effects-grid label {
        font-size: 0.88rem;
      }

      .effects-grid input[type="number"] {
        width: 100%;
        max-width: 5.5rem;
      }

      .timing-compact {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.4rem 0.5rem;
        flex: 1;
        align-content: start;
      }

      .timing-compact label {
        font-size: 0.85rem;
      }

      .timing-compact input[type="number"] {
        width: 100%;
      }

      .hint {
        font-size: 0.82rem;
        color: var(--muted);
        margin: 0;
        max-width: 22rem;
        line-height: 1.35;
      }

      @media (min-width: 901px) {
        .hint {
          margin-left: auto;
          text-align: right;
        }
      }

      .panel-session .session-grid {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        flex: 1;
        min-height: 0;
      }

      .session-grid label.full-row {
        flex-direction: column;
        align-items: stretch;
        gap: 0.2rem;
      }

      .session-grid select,
      .session-grid input[type="number"] {
        width: 100%;
        max-width: 100%;
      }

      .preset-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
      }

      .preset-row select {
        flex: 1;
        min-width: 8rem;
      }

      .preset-row button {
        font: inherit;
        font-size: 0.78rem;
        padding: 0.3rem 0.45rem;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
      }

      .preset-row button:hover {
        border-color: var(--accent-dim);
      }

      .record-row {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      #record-btn {
        font: inherit;
        font-size: 0.9rem;
        padding: 0.4rem 0.65rem;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
        align-self: flex-start;
        min-height: 2.25rem;
      }

      #record-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      #record-btn.recording {
        border-color: #c44;
        color: #f8a0a0;
        background: rgba(200, 60, 60, 0.15);
      }

      .record-hint {
        font-size: 0.72rem;
        color: var(--muted);
        line-height: 1.3;
      }

    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./lib/tone.js"></script>
    <script>
(function () {
        const Tone = window.Tone;


        const MAX_HARMONICS = 32;
        const PRESET_STORAGE_KEY = "drone-synth-presets-v1";
        const GAIN_EPS = 0.0001;
        
        const INTERVALS = [
          { label: "Off", semitones: null },
          { label: "Sub", semitones: -12 },
          { label: "Root", semitones: 0 },
          { label: "m2", semitones: 1 },
          { label: "M2", semitones: 2 },
          { label: "m3", semitones: 3 },
          { label: "M3", semitones: 4 },
          { label: "P4", semitones: 5 },
          { label: "#4 / b5", semitones: 6 },
          { label: "P5", semitones: 7 },
          { label: "m6", semitones: 8 },
          { label: "M6", semitones: 9 },
          { label: "m7", semitones: 10 },
          { label: "M7", semitones: 11 },
          { label: "8va", semitones: 12 },
        ];
        
        const ROOT_NOTES = [
          "B2",
          "A#2",
          "A2",
          "G#2",
          "G2",
          "F#2",
          "F2",
          "E2",
          "D#2",
          "D2",
          "C#2",
          "C2",
        ];
        
        const DEFAULTS = {
          root: "B2",
          tuningCents: 0,
          riseMin: 3,
          riseMax: 10,
          fallMin: 3,
          fallMax: 10,
          restMin: 2,
          restMax: 8,
          overtoneMode: "saw",
          fullCount: 8,
          randomCount: 8,
          clusterCount: 4,
          clusterDensity: 0.45,
          vibRateMax: 5,
          vibDepthMax: 0.35,
          filtRateMax: 0.35,
          filtDepthMax: 0.85,
          peakGain: 0.09,
          swellRise: "linear",
          swellFall: "exponential",
          stereoWidth: 0.65,
        };
        
        function randomBetween(a, b) {
          const lo = Math.min(a, b);
          const hi = Math.max(a, b);
          return lo + Math.random() * (hi - lo);
        }
        
        function normalizePartials(arr) {
          const max = Math.max(...arr, 1e-8);
          return arr.map((x) => x / max);
        }
        
        function sawPartials(count) {
          const n = Math.min(Math.max(Math.floor(count), 4), MAX_HARMONICS);
          const p = [];
          for (let i = 0; i < n; i++) p.push(1 / (i + 1));
          return normalizePartials(p);
        }
        
        function fullPartials(count) {
          const n = Math.min(Math.max(Math.floor(count), 1), MAX_HARMONICS);
          const p = [];
          for (let i = 0; i < n; i++) p.push(1);
          return normalizePartials(p);
        }
        
        function randomPartials(count) {
          const n = Math.min(Math.max(Math.floor(count), 1), MAX_HARMONICS);
          const p = [];
          for (let i = 0; i < n; i++) p.push(Math.random());
          return normalizePartials(p);
        }
        
        function clusterPartials(clusterCount, density) {
          const H = MAX_HARMONICS;
          const p = new Array(H).fill(0);
          const clusters = Math.min(Math.max(Math.floor(clusterCount), 1), 16);
          const d = Math.min(Math.max(density, 0), 1);
          for (let c = 0; c < clusters; c++) {
            const center = Math.floor(Math.random() * H);
            const spread = 1 + Math.floor(d * (H * 0.35));
            const amp = 0.2 + Math.random() * 0.8;
            for (let k = -spread; k <= spread; k++) {
              const idx = center + k;
              if (idx >= 0 && idx < H) {
                const falloff = 1 - Math.abs(k) / (spread + 1);
                p[idx] = Math.max(p[idx], amp * falloff);
              }
            }
          }
          return normalizePartials(p);
        }
        
        function buildPartials(mode, params) {
          switch (mode) {
            case "full":
              return fullPartials(params.fullCount);
            case "random":
              return randomPartials(params.randomCount);
            case "clusters":
              return clusterPartials(params.clusterCount, params.clusterDensity);
            default:
              return sawPartials(MAX_HARMONICS);
          }
        }
        
        function waitSeconds(sec) {
          return new Promise((resolve) => {
            Tone.getContext().setTimeout(resolve, sec);
          });
        }
        
        function scheduleRise(g, peak, sec, curve, startTime) {
          g.cancelScheduledValues(startTime);
          if (curve === "exponential") {
            g.setValueAtTime(GAIN_EPS, startTime);
            g.exponentialRampToValueAtTime(Math.max(peak, GAIN_EPS * 2), startTime + sec);
          } else {
            g.setValueAtTime(0, startTime);
            g.linearRampToValueAtTime(peak, startTime + sec);
          }
        }
        
        function scheduleFall(g, peak, sec, curve, startTime) {
          g.cancelScheduledValues(startTime);
          if (curve === "exponential") {
            g.setValueAtTime(Math.max(peak, GAIN_EPS), startTime);
            g.exponentialRampToValueAtTime(GAIN_EPS, startTime + sec);
            g.setValueAtTime(0, startTime + sec + 0.03);
          } else {
            g.setValueAtTime(peak, startTime);
            g.linearRampToValueAtTime(0, startTime + sec);
          }
        }
        
        class AmbientVoice {
          constructor(index) {
            this.index = index;
            this.osc = new Tone.Oscillator({
              frequency: 55,
              type: "custom",
              partials: [1],
            });
            this.vibrato = new Tone.Vibrato({ frequency: 2, depth: 0.2 });
            this.autoFilter = new Tone.AutoFilter({
              frequency: 0.12,
              baseFrequency: 120,
              octaves: 3.2,
              depth: 0.6,
            });
            this.gain = new Tone.Gain(0);
            this.panner = new Tone.Panner(0);
            this.osc.chain(this.vibrato, this.autoFilter, this.gain, this.panner);
            this.autoFilter.start();
            this.osc.start();
          }
        
          setFrequency(hz) {
            this.osc.frequency.setValueAtTime(hz, Tone.now());
          }
        
          setPartials(partials) {
            this.osc.partials = partials;
          }
        
          setPan(pan) {
            this.panner.pan.setValueAtTime(pan, Tone.now());
          }
        
          randomizeEffects(p) {
            const vr = randomBetween(0.05, p.vibRateMax);
            const vd = randomBetween(0, p.vibDepthMax);
            this.vibrato.frequency.setValueAtTime(vr, Tone.now());
            this.vibrato.depth.setValueAtTime(vd, Tone.now());
        
            const fr = randomBetween(0.03, p.filtRateMax);
            const fd = randomBetween(0, p.filtDepthMax);
            this.autoFilter.frequency.setValueAtTime(fr, Tone.now());
            this.autoFilter.depth.setValueAtTime(fd, Tone.now());
          }
        
          get output() {
            return this.panner;
          }
        
          dispose() {
            this.osc.stop();
            this.autoFilter.stop();
            this.osc.dispose();
            this.vibrato.dispose();
            this.autoFilter.dispose();
            this.gain.dispose();
            this.panner.dispose();
          }
        }
        
        let voices = [];
        let masterLimiter = null;
        let recorder = null;
        let isRecording = false;
        let isPlaying = false;
        let playSession = 0;
        
        function readParams() {
          const overtoneMode = document.querySelector(
            'input[name="overtone"]:checked',
          )?.value ?? "saw";
        
          return {
            root: document.getElementById("root").value,
            tuningCents: Number(document.getElementById("tuning").value) || 0,
            intervals: Array.from({ length: 8 }, (_, i) => {
              const sel = document.getElementById(`interval-${i}`);
              const opt = sel?.selectedOptions?.[0];
              const idx = Number(opt?.dataset?.intervalIndex ?? 2);
              return INTERVALS[idx]?.semitones ?? null;
            }),
            riseMin: Number(document.getElementById("rise-min").value),
            riseMax: Number(document.getElementById("rise-max").value),
            fallMin: Number(document.getElementById("fall-min").value),
            fallMax: Number(document.getElementById("fall-max").value),
            restMin: Number(document.getElementById("rest-min").value),
            restMax: Number(document.getElementById("rest-max").value),
            overtoneMode,
            fullCount: Number(document.getElementById("full-count").value),
            randomCount: Number(document.getElementById("random-count").value),
            clusterCount: Number(document.getElementById("cluster-count").value),
            clusterDensity: Number(document.getElementById("cluster-density").value),
            vibRateMax: Number(document.getElementById("vib-rate-max").value),
            vibDepthMax: Number(document.getElementById("vib-depth-max").value),
            filtRateMax: Number(document.getElementById("filt-rate-max").value),
            filtDepthMax: Number(document.getElementById("filt-depth-max").value),
            peakGain: Number(document.getElementById("peak-gain").value),
            swellRise: document.getElementById("swell-rise").value,
            swellFall: document.getElementById("swell-fall").value,
            stereoWidth: Number(document.getElementById("stereo-width").value),
          };
        }
        
        function getIntervalIndices() {
          return Array.from({ length: 8 }, (_, i) => {
            const sel = document.getElementById(`interval-${i}`);
            const opt = sel?.selectedOptions?.[0];
            return Number(opt?.dataset?.intervalIndex ?? 2);
          });
        }
        
        function getPresetPayload() {
          const p = readParams();
          return {
            version: 1,
            root: p.root,
            tuningCents: p.tuningCents,
            intervalIndices: getIntervalIndices(),
            riseMin: p.riseMin,
            riseMax: p.riseMax,
            fallMin: p.fallMin,
            fallMax: p.fallMax,
            restMin: p.restMin,
            restMax: p.restMax,
            overtoneMode: p.overtoneMode,
            fullCount: p.fullCount,
            randomCount: p.randomCount,
            clusterCount: p.clusterCount,
            clusterDensity: p.clusterDensity,
            vibRateMax: p.vibRateMax,
            vibDepthMax: p.vibDepthMax,
            filtRateMax: p.filtRateMax,
            filtDepthMax: p.filtDepthMax,
            peakGain: p.peakGain,
            swellRise: p.swellRise,
            swellFall: p.swellFall,
            stereoWidth: p.stereoWidth,
          };
        }
        
        function applyPresetPayload(data) {
          if (!data || data.version !== 1) return;
          document.getElementById("root").value = data.root ?? DEFAULTS.root;
          document.getElementById("tuning").value = String(
            data.tuningCents ?? DEFAULTS.tuningCents,
          );
          document.getElementById("tuning-val").textContent = String(
            data.tuningCents ?? DEFAULTS.tuningCents,
          );
          (data.intervalIndices ?? []).forEach((idx, i) => {
            const sel = document.getElementById(`interval-${i}`);
            if (!sel) return;
            const opt = Array.from(sel.options).find(
              (o) => Number(o.dataset.intervalIndex) === idx,
            );
            if (opt) sel.value = opt.value;
          });
          document.getElementById("rise-min").value = String(data.riseMin ?? DEFAULTS.riseMin);
          document.getElementById("rise-max").value = String(data.riseMax ?? DEFAULTS.riseMax);
          document.getElementById("fall-min").value = String(data.fallMin ?? DEFAULTS.fallMin);
          document.getElementById("fall-max").value = String(data.fallMax ?? DEFAULTS.fallMax);
          document.getElementById("rest-min").value = String(data.restMin ?? DEFAULTS.restMin);
          document.getElementById("rest-max").value = String(data.restMax ?? DEFAULTS.restMax);
          const om = data.overtoneMode ?? DEFAULTS.overtoneMode;
          const orad = document.querySelector(`input[name="overtone"][value="${om}"]`);
          if (orad) orad.checked = true;
          document.getElementById("full-count").value = String(data.fullCount ?? DEFAULTS.fullCount);
          document.getElementById("random-count").value = String(
            data.randomCount ?? DEFAULTS.randomCount,
          );
          document.getElementById("cluster-count").value = String(
            data.clusterCount ?? DEFAULTS.clusterCount,
          );
          document.getElementById("cluster-density").value = String(
            data.clusterDensity ?? DEFAULTS.clusterDensity,
          );
          document.getElementById("vib-rate-max").value = String(data.vibRateMax ?? DEFAULTS.vibRateMax);
          document.getElementById("vib-depth-max").value = String(
            data.vibDepthMax ?? DEFAULTS.vibDepthMax,
          );
          document.getElementById("filt-rate-max").value = String(
            data.filtRateMax ?? DEFAULTS.filtRateMax,
          );
          document.getElementById("filt-depth-max").value = String(
            data.filtDepthMax ?? DEFAULTS.filtDepthMax,
          );
          document.getElementById("peak-gain").value = String(data.peakGain ?? DEFAULTS.peakGain);
          document.getElementById("swell-rise").value = data.swellRise ?? DEFAULTS.swellRise;
          document.getElementById("swell-fall").value = data.swellFall ?? DEFAULTS.swellFall;
          document.getElementById("stereo-width").value = String(
            data.stereoWidth ?? DEFAULTS.stereoWidth,
          );
          if (voices.length) {
            updateAllFrequencies();
            updateStereoPanning();
          }
        }
        
        function loadPresetsFromStorage() {
          try {
            const raw = localStorage.getItem(PRESET_STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
          } catch {
            return [];
          }
        }
        
        function savePresetsToStorage(list) {
          localStorage.setItem(PRESET_STORAGE_KEY, JSON.stringify(list));
        }
        
        function refreshPresetDropdown(selectEl, selectedName) {
          const list = loadPresetsFromStorage();
          const names = list.map((x) => x.name).sort();
          selectEl.replaceChildren();
          const opt0 = document.createElement("option");
          opt0.value = "";
          opt0.textContent = "— Preset —";
          selectEl.appendChild(opt0);
          names.forEach((n) => {
            const o = document.createElement("option");
            o.value = n;
            o.textContent = n;
            if (n === selectedName) o.selected = true;
            selectEl.appendChild(o);
          });
        }
        
        function voiceFrequency(rootHz, semitones, tuningCents) {
          if (semitones === null) return 0;
          const st = semitones + tuningCents / 100;
          return rootHz * Math.pow(2, st / 12);
        }
        
        function updateAllFrequencies() {
          const p = readParams();
          const rootFreq = Tone.Frequency(p.root).toFrequency();
        
          voices.forEach((voice, i) => {
            const hz = voiceFrequency(rootFreq, p.intervals[i], p.tuningCents);
            if (hz > 0) voice.setFrequency(hz);
          });
        }
        
        function updateStereoPanning() {
          const w = Number(document.getElementById("stereo-width").value);
          const width = Math.min(1, Math.max(0, Number.isFinite(w) ? w : 0));
          voices.forEach((voice, i) => {
            const t = 7 > 0 ? i / 7 : 0;
            const pan = (t * 2 - 1) * width;
            voice.setPan(pan);
          });
        }
        
        function setTuningCents(cents) {
          const v = Math.round(Math.min(100, Math.max(-100, cents)));
          const input = document.getElementById("tuning");
          const readout = document.getElementById("tuning-val");
          input.value = String(v);
          readout.textContent = String(v);
          if (voices.length) updateAllFrequencies();
        }
        
        async function voiceLoop(voiceIndex, session) {
          while (isPlaying && session === playSession) {
            const p = readParams();
            const semitones = p.intervals[voiceIndex];
            const voice = voices[voiceIndex];
        
            if (semitones === null) {
              voice.gain.gain.setValueAtTime(0, Tone.now());
              await waitSeconds(0.4);
              continue;
            }
        
            await waitSeconds(randomBetween(p.restMin, p.restMax));
            if (!isPlaying || session !== playSession) break;
        
            const partials = buildPartials(p.overtoneMode, p);
            voice.setPartials(partials);
            voice.randomizeEffects(p);
        
            const hz = voiceFrequency(
              Tone.Frequency(p.root).toFrequency(),
              semitones,
              p.tuningCents,
            );
            voice.setFrequency(hz);
        
            const rise = randomBetween(p.riseMin, p.riseMax);
            const t0 = Tone.now();
            scheduleRise(voice.gain.gain, p.peakGain, rise, p.swellRise, t0);
        
            await waitSeconds(rise);
            if (!isPlaying || session !== playSession) break;
        
            const fall = randomBetween(p.fallMin, p.fallMax);
            const t1 = Tone.now();
            scheduleFall(voice.gain.gain, p.peakGain, fall, p.swellFall, t1);
        
            await waitSeconds(fall);
          }
        }
        
        function teardownAudio() {
          voices.forEach((v) => v.dispose());
          voices = [];
          if (masterLimiter) {
            masterLimiter.dispose();
            masterLimiter = null;
          }
        }
        
        async function startAudio() {
          await Tone.start();
          teardownAudio();
        
          masterLimiter = new Tone.Limiter(-8).toDestination();
        
          if (!recorder) {
            recorder = new Tone.Recorder();
          }
        
          for (let i = 0; i < 8; i++) {
            const voice = new AmbientVoice(i);
            voice.output.connect(masterLimiter);
            voices.push(voice);
          }
        
          masterLimiter.connect(recorder);
        
          updateAllFrequencies();
          updateStereoPanning();
          playSession += 1;
          const session = playSession;
          isPlaying = true;
        
          for (let i = 0; i < 8; i++) {
            voiceLoop(i, session);
          }
        
          const recBtn = document.getElementById("record-btn");
          if (recBtn) recBtn.disabled = false;
        }
        
        function stopAudio() {
          isPlaying = false;
          playSession += 1;
          const now = Tone.now();
          voices.forEach((v) => {
            v.gain.gain.cancelScheduledValues(now);
            v.gain.gain.setValueAtTime(0, now);
          });
        }
        
        function downloadRecording(blob) {
          const ext = blob.type.includes("webm")
            ? "webm"
            : blob.type.includes("ogg")
              ? "ogg"
              : "bin";
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `ambient-mark-walhimer-${Date.now()}.${ext}`;
          a.click();
          URL.revokeObjectURL(url);
        }
        
        function buildUI() {
          const app = document.getElementById("app");
        
          const rootOptions = ROOT_NOTES.map(
            (n) => `<option value="${n}" ${n === DEFAULTS.root ? "selected" : ""}>${n}</option>`,
          ).join("");
        
          const voiceRows = Array.from({ length: 8 }, (_, i) => {
            const defaultInterval = [2, 5, 9, 12, 7, 4, 0, 14][i];
            return `
            <label>
              <span>V${i + 1}</span>
              <select id="interval-${i}" class="interval-select">
                ${INTERVALS.map(
                  (iv, idx) =>
                    `<option value="${iv.label}" data-interval-index="${idx}" ${idx === defaultInterval ? "selected" : ""}>${iv.label}</option>`,
                ).join("")}
              </select>
            </label>`;
          }).join("");
        
          app.innerHTML = `
            <div class="shell">
              <header class="top-bar">
                <div class="title-block">
                  <h1>Ambient</h1>
                  <span class="byline">Mark Walhimer</span>
                </div>
                <div class="top-actions">
                  <button type="button" id="play" aria-pressed="false">Play</button>
                  <button type="button" id="reset">Reset</button>
                </div>
                <label class="compact">Root <select id="root">${rootOptions}</select></label>
                <label class="compact">Cents
                  <span class="stepper">
                    <button type="button" id="tuning-down" aria-label="Cents down">▼</button>
                    <input type="number" id="tuning" min="-100" max="100" step="1" value="0" />
                    <button type="button" id="tuning-up" aria-label="Cents up">▲</button>
                  </span>
                  <span id="tuning-val">0</span>
                </label>
                <p class="hint" title="Fast rise/fall/rest can stress the CPU.">Play to start · fast timings load the CPU</p>
              </header>
        
              <div class="voices-strip">
                ${voiceRows}
              </div>
        
              <div class="columns">
                <section class="panel">
                  <h2>Overtones</h2>
                  <div class="radio-grid">
                    <label class="inline"><input type="radio" name="overtone" value="saw" checked /> Saw 1/n</label>
                    <label class="inline"><input type="radio" name="overtone" value="full" /> Full <input type="number" id="full-count" min="1" max="32" value="8" /></label>
                    <label class="inline"><input type="radio" name="overtone" value="random" /> Rand <input type="number" id="random-count" min="1" max="32" value="8" /></label>
                    <label class="inline"><input type="radio" name="overtone" value="clusters" /> Clust <input type="number" id="cluster-count" min="1" max="16" value="4" /> d <input type="number" id="cluster-density" min="0" max="1" step="0.05" value="0.45" /></label>
                  </div>
                </section>
        
                <section class="panel">
                  <h2>Effects (0…max / swell)</h2>
                  <div class="effects-grid">
                    <label>Vib f<sub>max</sub> <input type="number" id="vib-rate-max" min="0.1" max="12" step="0.1" value="5" /></label>
                    <label>Vib depth <input type="number" id="vib-depth-max" min="0" max="1" step="0.05" value="0.35" /></label>
                    <label>Flt f<sub>max</sub> <input type="number" id="filt-rate-max" min="0.02" max="4" step="0.02" value="0.35" /></label>
                    <label>Flt depth <input type="number" id="filt-depth-max" min="0" max="1" step="0.05" value="0.85" /></label>
                    <label>Peak gain <input type="number" id="peak-gain" min="0.02" max="0.2" step="0.01" value="0.09" /></label>
                  </div>
                </section>
        
                <section class="panel">
                  <h2>Timing (s)</h2>
                  <div class="timing-compact">
                    <label>Rise min <input type="number" id="rise-min" min="0.2" max="120" step="0.5" value="3" /></label>
                    <label>Rise max <input type="number" id="rise-max" min="0.2" max="120" step="0.5" value="10" /></label>
                    <label>Fall min <input type="number" id="fall-min" min="0.2" max="120" step="0.5" value="3" /></label>
                    <label>Fall max <input type="number" id="fall-max" min="0.2" max="120" step="0.5" value="10" /></label>
                    <label>Rest min <input type="number" id="rest-min" min="0.1" max="120" step="0.5" value="2" /></label>
                    <label>Rest max <input type="number" id="rest-max" min="0.1" max="120" step="0.5" value="8" /></label>
                  </div>
                </section>
        
                <section class="panel panel-session">
                  <h2>Session</h2>
                  <div class="session-grid">
                    <label class="full-row">Swell rise
                      <select id="swell-rise">
                        <option value="linear">Linear</option>
                        <option value="exponential">Exponential</option>
                      </select>
                    </label>
                    <label class="full-row">Swell fall
                      <select id="swell-fall">
                        <option value="linear">Linear</option>
                        <option value="exponential" selected>Exponential</option>
                      </select>
                    </label>
                    <label class="full-row">Stereo width
                      <input type="number" id="stereo-width" min="0" max="1" step="0.05" value="0.65" title="0 = mono, 1 = voices spread L–R" />
                    </label>
                    <div class="preset-row full-row">
                      <select id="preset-select"></select>
                      <button type="button" id="preset-load">Load</button>
                      <button type="button" id="preset-save">Save</button>
                      <button type="button" id="preset-delete">Delete</button>
                    </div>
                    <div class="record-row full-row">
                      <button type="button" id="record-btn" disabled title="Start audio first">Record</button>
                      <span class="record-hint">Saves what you hear (format depends on browser; often WebM).</span>
                    </div>
                  </div>
                </section>
              </div>
            </div>
          `;
        
          document.getElementById("swell-rise").value = DEFAULTS.swellRise;
          document.getElementById("swell-fall").value = DEFAULTS.swellFall;
        
          const presetSelect = document.getElementById("preset-select");
          refreshPresetDropdown(presetSelect, "");
        
          document.getElementById("tuning").addEventListener("input", (e) => {
            setTuningCents(Number(e.target.value) || 0);
          });
        
          document.getElementById("tuning-up").addEventListener("click", () => {
            setTuningCents(Number(document.getElementById("tuning").value) + 1);
          });
        
          document.getElementById("tuning-down").addEventListener("click", () => {
            setTuningCents(Number(document.getElementById("tuning").value) - 1);
          });
        
          document.getElementById("root").addEventListener("change", () => {
            if (voices.length) updateAllFrequencies();
          });
        
          document.querySelectorAll(".interval-select").forEach((sel) => {
            sel.addEventListener("change", () => {
              if (voices.length) updateAllFrequencies();
            });
          });
        
          document.getElementById("stereo-width").addEventListener("input", () => {
            if (voices.length) updateStereoPanning();
          });
        
          document.getElementById("preset-load").addEventListener("click", () => {
            const name = presetSelect.value;
            if (!name) return;
            const list = loadPresetsFromStorage();
            const found = list.find((x) => x.name === name);
            if (found) applyPresetPayload(found.data);
          });
        
          document.getElementById("preset-save").addEventListener("click", () => {
            const name = window.prompt("Preset name?");
            if (!name || !name.trim()) return;
            const trimmed = name.trim().slice(0, 64);
            const list = loadPresetsFromStorage().filter((x) => x.name !== trimmed);
            list.push({ name: trimmed, data: getPresetPayload() });
            savePresetsToStorage(list);
            refreshPresetDropdown(presetSelect, trimmed);
          });
        
          document.getElementById("preset-delete").addEventListener("click", () => {
            const name = presetSelect.value;
            if (!name) return;
            const list = loadPresetsFromStorage().filter((x) => x.name !== name);
            savePresetsToStorage(list);
            refreshPresetDropdown(presetSelect, "");
          });
        
          document.getElementById("record-btn").addEventListener("click", async () => {
            if (!recorder || !Tone.context.state) return;
            const btn = document.getElementById("record-btn");
            if (!isRecording) {
              await recorder.start();
              isRecording = true;
              btn.textContent = "Stop & save";
              btn.classList.add("recording");
            } else {
              const blob = await recorder.stop();
              isRecording = false;
              btn.textContent = "Record";
              btn.classList.remove("recording");
              downloadRecording(blob);
              if (masterLimiter && isPlaying) {
                try {
                  await recorder.start();
                } catch {
                  recorder = new Tone.Recorder();
                  masterLimiter.connect(recorder);
                  await recorder.start();
                }
              }
            }
          });
        
          const playBtn = document.getElementById("play");
          playBtn.addEventListener("click", async () => {
            if (!isPlaying) {
              await startAudio();
              playBtn.textContent = "Stop";
              playBtn.classList.add("playing");
              playBtn.setAttribute("aria-pressed", "true");
            } else {
              if (isRecording && recorder) {
                await recorder.stop();
                isRecording = false;
                const b = document.getElementById("record-btn");
                b.textContent = "Record";
                b.classList.remove("recording");
              }
              stopAudio();
              playBtn.textContent = "Play";
              playBtn.classList.remove("playing");
              playBtn.setAttribute("aria-pressed", "false");
              document.getElementById("record-btn").disabled = true;
            }
          });
        
          document.getElementById("reset").addEventListener("click", () => {
            applyPresetPayload({
              version: 1,
              ...DEFAULTS,
              intervalIndices: [2, 5, 9, 12, 7, 4, 0, 14],
            });
            if (voices.length) updateAllFrequencies();
          });
        }
        
        buildUI();
        
      })();
    </script>
  </body>
</html>
