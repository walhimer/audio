<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Ambient synthesizer — layered drones and reverb. Tap to start audio." />
  <title>Ambient — Soundscapes — Mark Walhimer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:    #0a0a0a;
      --offwhite: #f0ede6;
      --dim:      #666660;
      --rule:     #1e1e1e;
      --accent:   #c8a882;
      --border:   #2a2a2a;
      --bright:   #f0f0f0;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--offwhite);
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 300;
      min-height: 100vh;
    }

    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: stretch;
      padding: 0 40px;
      border-bottom: 1px solid var(--border);
      background: var(--black);
    }
    .nav-logo {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      padding: 22px 32px 22px 0;
      margin-right: 8px;
      border-right: 1px solid var(--border);
    }
    .nav-links { display: flex; align-items: stretch; gap: 0; flex-wrap: wrap; }
    .nav-links a {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      padding: 22px 20px;
      transition: color 0.15s;
      display: flex;
      align-items: center;
    }
    .nav-links a:hover { color: var(--bright); }
    .nav-links a.active { color: var(--accent); border-bottom: 1px solid var(--accent); margin-bottom: -1px; }

    #gate {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      background: rgba(8, 8, 8, 0.88);
      cursor: pointer;
      font-family: Georgia, 'Times New Roman', serif;
    }
    #gate > div {
      padding: 88px 32px 32px;
      text-align: center;
      max-width: 40ch;
    }
    #gate p {
      margin: 0 0 20px;
      font-size: clamp(16px, 2.2vw, 19px);
      font-weight: 300;
      line-height: 1.65;
      color: rgba(240, 237, 230, 0.88);
    }
    #gate button {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 14px 24px;
      border-radius: 0;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      pointer-events: none;
      transition: color 0.15s, border-color 0.15s;
    }
    #gate.hidden {
      display: none;
    }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 40px 80px;
    }
    main h2 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    main .lede {
      font-size: clamp(15px, 1.8vw, 18px);
      line-height: 1.65;
      color: rgba(240, 237, 230, 0.82);
      margin-bottom: 32px;
      max-width: 42rem;
    }
    .controls {
      border: 1px solid var(--border);
      padding: 24px 28px;
      background: rgba(20, 20, 20, 0.6);
    }
    .controls.hidden { display: none; }
    .controls label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 20px;
    }
    .controls label:last-child { margin-bottom: 0; }
    .controls input[type="range"] {
      width: 100%;
      max-width: 320px;
      accent-color: var(--accent);
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">Mark Walhimer</a>
    <div class="nav-links">
      <a href="/index.html">Installations</a>
      <a href="/projects/index.html">Projects</a>
      <a href="/sketches/index.html">Sketches</a>
      <a href="/audio/" class="active">Soundscapes</a>
      <a href="/bio/index.html">Bio / CV</a>
      <a href="/contact/index.html">Contact</a>
    </div>
  </nav>
  <div id="gate">
    <div>
      <p>Layered sine drones, soft noise bed, and long reverb — adjust depth, air, and shimmer after you start. Tap anywhere (audio needs a gesture).</p>
      <button type="button" id="go">Start audio</button>
    </div>
  </div>
  <main>
    <h2>Ambient</h2>
    <p class="lede">Self-contained p5.sound patch. No samples.</p>
    <div id="controls" class="controls hidden" aria-hidden="true">
      <label>
        Depth (bass)
        <input type="range" id="depth" min="0" max="100" value="35" />
      </label>
      <label>
        Air (noise)
        <input type="range" id="air" min="0" max="100" value="18" />
      </label>
      <label>
        Shimmer (high layer)
        <input type="range" id="shimmer" min="0" max="100" value="28" />
      </label>
    </div>
  </main>

  <script src="./lib/p5.min.js"></script>
  <script src="./lib/p5.sound.min.js"></script>
  <script>
  let bass, highLayer, airNoise, reverb;
  let baseMidi = 38;
  let highMidi = 67;
  let depth01 = 0.35;
  let air01 = 0.18;
  let shimmer01 = 0.28;
  let t0 = 0;

  function sliderTo01(id) {
    const el = document.getElementById(id);
    return el ? Number(el.value) / 100 : 0;
  }

  function applyLevels() {
    depth01 = sliderTo01("depth");
    air01 = sliderTo01("air");
    shimmer01 = sliderTo01("shimmer");
    if (bass) bass.amp(depth01 * 0.14, 0.05);
    if (airNoise) airNoise.amp(air01 * 0.06, 0.05);
    if (highLayer) highLayer.amp(shimmer01 * 0.09, 0.05);
  }

  function startPatch() {
    reverb = new p5.Reverb();

    bass = new p5.Oscillator("sine");
    bass.freq(midiToFreq(baseMidi));
    bass.amp(depth01 * 0.14);
    bass.start();
    reverb.process(bass, 9, 0.55);

    highLayer = new p5.Oscillator("sine");
    highLayer.freq(midiToFreq(highMidi));
    highLayer.amp(shimmer01 * 0.09);
    highLayer.start();
    reverb.process(highLayer, 7, 0.5);

    airNoise = new p5.Noise("pink");
    airNoise.amp(air01 * 0.06);
    airNoise.start();
    reverb.process(airNoise, 5, 0.35);

    ["depth", "air", "shimmer"].forEach((id) => {
      const el = document.getElementById(id);
      if (el) el.addEventListener("input", applyLevels);
    });

    const panel = document.getElementById("controls");
    if (panel) {
      panel.classList.remove("hidden");
      panel.setAttribute("aria-hidden", "false");
    }
    t0 = millis() / 1000;
  }

  function setup() {
    noCanvas();
  }

  let audioStarted = false;
  function beginAudioFromUserGesture() {
    if (audioStarted) return;
    audioStarted = true;
    const gate = document.getElementById("gate");
    if (gate) gate.classList.add("hidden");
    const run = () => {
      startPatch();
    };
    if (typeof userStartAudio === "function") {
      userStartAudio().then(run).catch(() => {
        if (typeof getAudioContext === "function") getAudioContext().resume();
        run();
      });
    } else {
      if (typeof getAudioContext === "function") getAudioContext().resume();
      run();
    }
  }

  function wireStartGate() {
    const gate = document.getElementById("gate");
    if (!gate || gate.dataset.wired === "1") return;
    gate.dataset.wired = "1";
    gate.addEventListener(
      "click",
      () => {
        beginAudioFromUserGesture();
      },
      { once: true }
    );
    gate.addEventListener("keydown", function onGateKeydown(e) {
      if (e.key !== "Enter" && e.key !== " ") return;
      e.preventDefault();
      gate.removeEventListener("keydown", onGateKeydown);
      beginAudioFromUserGesture();
    });
    gate.setAttribute("tabindex", "0");
    gate.setAttribute("role", "button");
    gate.setAttribute("aria-label", "Start audio");
  }

  function scheduleWireStartGate() {
    setTimeout(wireStartGate, 0);
  }
  if (document.readyState === "complete") {
    scheduleWireStartGate();
  } else {
    window.addEventListener("load", scheduleWireStartGate);
  }

  function draw() {
    if (!bass) return;
    const t = millis() / 1000 - t0;
    const wobble = Math.sin(t * 0.09) * 0.35 + Math.sin(t * 0.031) * 0.2;
    bass.freq(midiToFreq(baseMidi + wobble));
    const drift = Math.sin(t * 0.043) * 2.2;
    highLayer.freq(midiToFreq(highMidi + drift));
    if (frameCount % 480 === 0) {
      baseMidi = random([36, 38, 41, 43]);
      highMidi = random([64, 67, 69, 72, 74]);
    }
  }
  </script>
</body>
</html>
